# ── Login / Registration ──────────────────────────────────────────────────────
signup_link=//a[@id='customer_register_link']
login_link=//a[@id='customer_login_link']
firstname_field=//input[@id='first_name']
lastname_field=//input[@id='last_name']
email_field=//input[@id='email']
password_field=//input[@id='password']
create_button=//input[@value='Create']
signin_button=//input[@value='Sign In']
# Logout link matched by its href, which is always /account/logout on Shopify
logout_button=//a[contains(@href,'/account/logout')]

# ── Product Search ──────────────────────────────────────────────────────────
# Products are linked via /products/ URLs — more reliable than any CSS class name
search_result_item=//a[contains(@href,'/products/')]
search_result_link=(//a[contains(@href,'/products/')])[1]
search_no_result_message=//*[contains(text(),'No results') or contains(text(),'no results')]
# h1 on product detail page (no class dependency)
product_title=//h1

# ── Add to Cart ──────────────────────────────────────────────────────────────
catalog_link=//a[@href='/collections/all']
product_item_link=(//a[contains(@href,'/products/')])[1]
# Some Shopify themes use <input name="add">, others use <button name="add">.
# //* matches both so we are not locked to one element type.
add_to_cart_button=//*[@name='add']
cart_icon=//a[@href='/cart']
cart_count=//span[contains(@class,'cart-count')]
# Cart items linked to product pages
cart_item_title=//a[contains(@href,'/products/')]
cart_total_price=//span[contains(@class,'cart__subtotal-price')]
cart_checkout_button=//input[@name='checkout']

# ── Checkout ─────────────────────────────────────────────────────────────────
checkout_email_field=//input[@id='checkout_email']
checkout_firstname_field=//input[@id='checkout_shipping_address_first_name']
checkout_lastname_field=//input[@id='checkout_shipping_address_last_name']
checkout_address_field=//input[@id='checkout_shipping_address_address1']
checkout_city_field=//input[@id='checkout_shipping_address_city']
checkout_country_field=//select[@id='checkout_shipping_address_country']
checkout_zip_field=//input[@id='checkout_shipping_address_zip']
checkout_phone_field=//input[@id='checkout_shipping_address_phone']
checkout_continue_button=//button[@id='continue_button']
shipping_rate_radio=(//input[@name='checkout[shipping_rate][id]'])[1]
shipping_continue_button=//button[@id='continue_button']
checkout_step_shipping=//span[contains(@class,'step__header__title') and contains(text(),'Shipping')]

# ── Payment ───────────────────────────────────────────────────────────────────
payment_card_number=//input[@id='number']
payment_card_name=//input[@id='name']
payment_card_expiry=//input[@id='expiry']
payment_card_cvv=//input[@id='verification_value']
payment_pay_button=//button[@id='continue_button']
order_confirmation_heading=//*[contains(@class,'os-step__title') or contains(text(),'Thank you')]

# ── Order History ─────────────────────────────────────────────────────────────
account_link=//a[@href='/account']
account_page_heading=//h1[contains(text(),'Account') or contains(text(),'account')]
order_history_table=//table[contains(@class,'responsive-table') or contains(@class,'table--responsive')]
order_first_link=(//table//td//a)[1]
order_detail_heading=//h1[contains(@class,'order__title') or contains(text(),'Order')]